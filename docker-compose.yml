networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api 
      - frontend
    networks:
      - dev 

  api:
    build:
      context: ./fastAPI
    networks:
      - dev

  frontend:
    build: 
      context: ./HTML
    networks:
      - dev
